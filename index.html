<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offer Graphic Generator</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --muted: #64748b;
        --text: #0f172a;
        --accent: #0ea5e9;
        --danger: #b91c1c;
        --border: #e2e8f0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .container {
        max-width: 1100px;
        margin: 24px auto;
        padding: 0 16px;
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 20px;
      }
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px;
      }
      h1 { margin-top: 0; }
      .muted { color: var(--muted); }
      .stack { display: grid; gap: 12px; }
      .row { display: grid; gap: 10px; grid-template-columns: 1fr 1fr; }
      label { display: grid; gap: 6px; font-size: 14px; }
      input {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        width: 100%;
      }
      button {
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: white;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 600;
      }
      button[disabled] { opacity: 0.6; cursor: not-allowed; }
      .error {
        color: var(--danger);
        font-size: 14px;
        min-height: 20px;
      }
      #previewCard {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        background: white;
        min-height: 240px;
      }
      .price { font-size: 26px; font-weight: 700; }
      .meta { font-size: 13px; color: var(--muted); }
      .vehicle-title {
        font-weight: 700;
        margin-bottom: 8px;
        line-height: 1.2;
        font-size: 20px;
      }
      @media (max-width: 900px) {
        .container { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="panel">
        <h1>Offer Graphic Generator</h1>
        <p class="muted">Upload Clark Hyundai purchase agreement PDF and review values before download.</p>

        <div class="stack">
          <label>
            Upload PDF or image
            <input id="fileInput" type="file" accept="application/pdf,image/*" />
          </label>
          <button id="extractBtn" type="button">Extract Deal Data</button>
          <div id="status" class="muted"></div>
          <div id="error" class="error"></div>
        </div>

        <hr style="margin:16px 0;border:0;border-top:1px solid var(--border)">

        <div class="stack" id="reviewForm">
          <div class="row">
            <label>Customer Name <input id="customerName" /></label>
            <label>Customer Phone <input id="customerPhone" /></label>
          </div>
          <label>Vehicle Name <input id="vehicleName" /></label>
          <div class="row">
            <label>Retail Price <input id="retailPrice" type="number" step="0.01" /></label>
            <label>Discount (Savings) <input id="discount" type="number" step="0.01" /></label>
          </div>
          <div class="row">
            <label>Amount Financed <input id="amountFinanced" type="number" step="0.01" /></label>
            <label>Trade Equity <input id="tradeEquity" type="number" step="0.01" /></label>
          </div>
          <div class="row">
            <label>Payment <input id="payment" type="number" step="0.01" /></label>
            <label>APR <input id="apr" type="number" step="0.01" /></label>
          </div>
          <div class="row">
            <label>Term (months) <input id="term" type="number" /></label>
            <label>Stock Number <input id="stockNumber" /></label>
          </div>
          <div class="row">
            <label>VIN <input id="vin" /></label>
            <label>Vehicle Color <input id="vehicleColor" /></label>
          </div>
          <div class="row">
            <label>Vehicle Mileage <input id="vehicleMileage" type="number" /></label>
            <label>Sales Price <input id="salesPrice" type="number" step="0.01" /></label>
          </div>
          <div class="row">
            <label>Total Sales Price <input id="totalSalesPrice" type="number" step="0.01" /></label>
            <label>Trade Allowance <input id="tradeAllowance" type="number" step="0.01" /></label>
          </div>
          <label>Trade Payoff <input id="tradePayoff" type="number" step="0.01" /></label>

          <button id="downloadBtn" type="button">Download Graphic</button>
        </div>
      </section>

      <aside class="panel">
        <h2 style="margin-top:0">Preview</h2>
        <div id="previewCard">
          <div id="pvVehicle" class="vehicle-title">Vehicle</div>
          <div id="pvCustomer" class="meta" style="margin-bottom:10px;">Customer</div>
          <div class="price" id="pvPayment">$0/mo</div>
          <div class="meta" id="pvTerms">0 months • 0% APR</div>
          <hr style="margin:12px 0;border:0;border-top:1px solid var(--border)">
          <div class="meta" id="pvNumbers">Retail $0 • Savings $0 • Trade Equity $0</div>
        </div>
      </aside>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

      const fields = [
        "customerName","customerPhone","vehicleName","retailPrice","discount","tradeEquity",
        "amountFinanced","payment","apr","term","stockNumber","vin","vehicleColor",
        "vehicleMileage","salesPrice","totalSalesPrice","tradeAllowance","tradePayoff"
      ];

      const num = (v) => Number(v || 0);
      const usd = new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });
      const currency = (n) => {
        const value = num(n);
        return value < 0 ? `-${usd.format(Math.abs(value))}` : usd.format(value);
      };
      const cleanVehicleForCard = (name) =>
        String(name || "")
          .replace(/,\s*body\s*type\s*:.*/i, "")
          .replace(/\s+/g, " ")
          .trim()
          .slice(0, 48);

      function updatePreview() {
        document.getElementById("pvVehicle").textContent = cleanVehicleForCard(document.getElementById("vehicleName").value) || "Vehicle";
        document.getElementById("pvCustomer").textContent = document.getElementById("customerName").value || "Customer";
        document.getElementById("pvPayment").textContent = `${currency(document.getElementById("payment").value)}/mo`;
        document.getElementById("pvTerms").textContent = `${num(document.getElementById("term").value)} months • ${num(document.getElementById("apr").value)}% APR`;
        document.getElementById("pvNumbers").textContent =
          `Retail ${currency(document.getElementById("retailPrice").value)} • ` +
          `Savings ${currency(document.getElementById("discount").value)} • ` +
          `Trade Equity ${currency(document.getElementById("tradeEquity").value)}`;
      }

      function setError(message) {
        document.getElementById("error").textContent = message || "";
      }

      function fillForm(data) {
        for (const key of fields) {
          const el = document.getElementById(key);
          if (!el || data[key] === undefined || data[key] === null) continue;
          el.value = data[key];
        }
        updatePreview();
      }

      function fileToBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      async function convertPdfToImageDataUrl(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 2 });
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: context, viewport }).promise;
        return canvas.toDataURL("image/png");
      }

      fields.forEach((id) => document.getElementById(id).addEventListener("input", updatePreview));
      updatePreview();

      document.getElementById("extractBtn").addEventListener("click", async () => {
        setError("");
        const statusEl = document.getElementById("status");
        const input = document.getElementById("fileInput");
        const file = input.files && input.files[0];
        if (!file) {
          setError("Please choose a PDF or image file first.");
          return;
        }

        statusEl.textContent = "Extracting...";

        try {
          let dataUrl;
          let mimeType;

          if (file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf")) {
            statusEl.textContent = "Converting PDF first page to image...";
            dataUrl = await convertPdfToImageDataUrl(file);
            mimeType = "image/png";
          } else {
            dataUrl = await fileToBase64(file);
            mimeType = file.type || "image/png";
          }

          const imageBase64 = String(dataUrl).split(",")[1];
          if (!imageBase64) throw new Error("Unable to read image data from uploaded file.");

          const response = await fetch("/api/extract", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ mimeType, imageBase64 }),
          });

          let payload = null;
          try {
            payload = await response.json();
          } catch {
            payload = { ok: false, error: `Extraction failed (HTTP ${response.status}).` };
          }
          if (!response.ok || !payload.ok) {
            throw new Error(payload.error || `Extraction failed (HTTP ${response.status}).`);
          }

          fillForm(payload.data || {});
          statusEl.textContent = `Extraction complete (${payload.source_type || "unknown source"}).`;
        } catch (error) {
          statusEl.textContent = "";
          setError(error?.message || "Extraction failed. Please review and enter values manually.");
        }
      });

      document.getElementById("downloadBtn").addEventListener("click", async () => {
        setError("");
        const btn = document.getElementById("downloadBtn");
        const prevLabel = btn.textContent;
        btn.disabled = true;
        btn.textContent = "Rendering...";
        const card = document.getElementById("previewCard");
        try {
          const canvas = await html2canvas(card, { backgroundColor: "#ffffff", scale: 3, useCORS: true });
          const a = document.createElement("a");
          a.href = canvas.toDataURL("image/png");
          a.download = "offer-graphic.png";
          a.click();
        } finally {
          btn.disabled = false;
          btn.textContent = prevLabel;
        }
      });
    </script>
  </body>
</html>
